name: Backup health

on:
  schedule:
    - cron: '41 */6 * * *'

permissions:
  contents: read

concurrency:
  group: backup-health-production
  cancel-in-progress: true

jobs:
  verify-production:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Read-only monitoring credentials live outside the approval-gated deploy
    # environment so scheduled verification can run unattended.
    environment: production-monitoring
    steps:
      - name: Require an immutable main revision
        env:
          SOURCE_REF: ${{ github.ref }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          if [[ "$SOURCE_REF" != refs/heads/main ]]; then
            echo "Backup health checks must run from main" >&2
            exit 1
          fi
          if [[ ! "$SOURCE_SHA" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "GitHub did not provide an immutable commit SHA" >&2
            exit 1
          fi
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Verify immutable checkout
        env:
          SOURCE_SHA: ${{ github.sha }}
        run: test "$(git rev-parse HEAD)" = "${SOURCE_SHA,,}"
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - name: Install pinned Appwrite CLI
        run: npm install --global appwrite-cli@22.6.1
      - name: Verify recent production backup
        env:
          APPWRITE_ENDPOINT: ${{ vars.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ vars.APPWRITE_PROJECT_ID }}
          APPWRITE_BACKUP_API_KEY: ${{ secrets.APPWRITE_BACKUP_API_KEY }}
          APPWRITE_BACKUP_POLICY_ID: lemonize-daily
          APPWRITE_BACKUP_RETENTION_DAYS: '7'
          APPWRITE_BACKUP_SCHEDULE: '0 0 * * *'
          APPWRITE_CLI_HOME: ${{ runner.temp }}/appwrite-cli
        run: bash scripts/ops/appwrite-backup.sh verify
