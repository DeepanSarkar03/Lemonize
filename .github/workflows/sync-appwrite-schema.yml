name: Sync Appwrite schema

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Protected Appwrite environment to update
        required: true
        type: choice
        options:
          - staging
          - production
      git_ref:
        description: Full 40-character commit SHA that passed CI
        required: true
        type: string

permissions:
  contents: read
  checks: read

concurrency:
  group: appwrite-schema-${{ inputs.environment }}
  cancel-in-progress: false

env:
  NODE_VERSION: 24

jobs:
  preflight:
    name: Revalidate immutable schema candidate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0
          persist-credentials: false
      - name: Require a main-reachable immutable commit
        env:
          REQUESTED_SHA: ${{ inputs.git_ref }}
        run: |
          if [[ ! "$REQUESTED_SHA" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "git_ref must be a full 40-character commit SHA" >&2
            exit 1
          fi
          test "$(git rev-parse HEAD)" = "${REQUESTED_SHA,,}"
          git show-ref --verify --quiet refs/remotes/origin/main || {
            echo "origin/main was not fetched by the immutable checkout" >&2
            exit 1
          }
          git merge-base --is-ancestor "${REQUESTED_SHA,,}" refs/remotes/origin/main || {
            echo "schema SHA must be reachable from origin/main" >&2
            exit 1
          }
      - name: Require successful CI for the exact commit
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_SHA: ${{ inputs.git_ref }}
        run: |
          required_checks=(
            'Frozen install, lint, typecheck, build, test'
            'Audit production dependencies (high/critical)'
            'Audit development dependencies (high/critical)'
            'Secret scan (full history)'
            'Worker dry-run and web build'
            'Artifact integrity, extraction, and CLI security tests'
          )
          for check_name in "${required_checks[@]}"; do
            successful=$(gh api \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "repos/${GITHUB_REPOSITORY}/commits/${REQUESTED_SHA}/check-runs?per_page=100" \
              --jq "[.check_runs[] | select(.name == \"$check_name\" and .conclusion == \"success\")] | length")
            test "$successful" -ge 1 || {
              echo "Required CI check has not passed for $REQUESTED_SHA: $check_name" >&2
              exit 1
            }
          done

  sync:
    name: Sync ${{ inputs.environment }} Appwrite schema
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Validate protected Appwrite target
        env:
          APPWRITE_ENDPOINT: ${{ vars.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ vars.APPWRITE_PROJECT_ID }}
          DEPLOY_ENV: ${{ inputs.environment }}
        run: |
          bash scripts/ops/require-env.sh \
            APPWRITE_ENDPOINT APPWRITE_PROJECT_ID DEPLOY_ENV
          node scripts/ops/verify-appwrite-config.mjs "$DEPLOY_ENV"
      - name: Reconcile checked-in Appwrite resource definitions
        env:
          APPWRITE_ENDPOINT: ${{ vars.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ vars.APPWRITE_PROJECT_ID }}
          APPWRITE_DEPLOY_API_KEY: ${{ secrets.APPWRITE_DEPLOY_API_KEY }}
          DEPLOY_ENV: ${{ inputs.environment }}
        run: |
          bash scripts/ops/require-env.sh \
            APPWRITE_ENDPOINT APPWRITE_PROJECT_ID APPWRITE_DEPLOY_API_KEY DEPLOY_ENV
          # Additive-only: creates absent TablesDB/Storage resources and fails
          # on drift. It never updates or deletes existing production data.
          node scripts/ops/reconcile-appwrite-schema.mjs "$DEPLOY_ENV"
