name: Appwrite backup policy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Protected Appwrite environment
        required: true
        type: choice
        options:
          - staging
          - production
      operation:
        description: Reconcile the policy, verify it, or create an on-demand archive
        required: true
        type: choice
        options:
          - verify
          - reconcile
          - create

permissions:
  contents: read

concurrency:
  group: appwrite-backup-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  backups:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: ${{ inputs.environment }}
    steps:
      - name: Require an immutable main revision
        env:
          SOURCE_REF: ${{ github.ref }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          if [[ "$SOURCE_REF" != refs/heads/main ]]; then
            echo "Backup operations must be dispatched from main" >&2
            exit 1
          fi
          if [[ ! "$SOURCE_SHA" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "GitHub did not provide an immutable commit SHA" >&2
            exit 1
          fi
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Verify immutable checkout
        env:
          SOURCE_SHA: ${{ github.sha }}
        run: test "$(git rev-parse HEAD)" = "${SOURCE_SHA,,}"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
      - name: Install pinned Appwrite CLI
        run: >-
          npm install --global --ignore-scripts --no-audit --no-fund
          appwrite-cli@22.6.1
      - name: Reconcile or inspect backups
        env:
          APPWRITE_ENDPOINT: ${{ vars.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ vars.APPWRITE_PROJECT_ID }}
          APPWRITE_BACKUP_API_KEY: ${{ secrets.APPWRITE_BACKUP_API_KEY }}
          APPWRITE_BACKUP_POLICY_ID: lemonize-daily
          APPWRITE_BACKUP_RETENTION_DAYS: '7'
          APPWRITE_BACKUP_SCHEDULE: '0 0 * * *'
          APPWRITE_CLI_HOME: ${{ runner.temp }}/appwrite-cli
        run: bash scripts/ops/appwrite-backup.sh "${{ inputs.operation }}"
