name: Release CLI package

# Publish the CLI through npm trusted publishing. The public bootstrap scripts
# delegate to this provenance-enabled package; mutable R2 binaries are not a
# trusted installation channel.
on:
  push:
    tags: ['cli-v*']

permissions:
  contents: read
  checks: read

concurrency:
  group: release-cli-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Require protected main commit and matching package version
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ github.sha }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          git show-ref --verify --quiet refs/remotes/origin/main || {
            echo "origin/main was not fetched by the immutable checkout" >&2
            exit 1
          }
          git merge-base --is-ancestor "$RELEASE_SHA" refs/remotes/origin/main || {
            echo "Release commit must be reachable from main" >&2
            exit 1
          }
          package_version=$(node -p "require('./packages/cli/package.json').version")
          test "$RELEASE_TAG" = "cli-v$package_version" || {
            echo "Tag does not match packages/cli version" >&2
            exit 1
          }
          required_checks=(
            'Frozen install, lint, typecheck, build, test'
            'Audit production dependencies (high/critical)'
            'Audit development dependencies (high/critical)'
            'Secret scan (full history)'
            'Worker dry-run and web build'
            'Artifact integrity, extraction, and CLI security tests'
          )
          for check_name in "${required_checks[@]}"; do
            successful=$(gh api \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "repos/${GITHUB_REPOSITORY}/commits/${RELEASE_SHA}/check-runs?per_page=100" \
              --jq "[.check_runs[] | select(.name == \"$check_name\" and .conclusion == \"success\")] | length")
            test "$successful" -ge 1 || {
              echo "Required CI check has not passed: $check_name" >&2
              exit 1
            }
          done

  package:
    needs: gate
    runs-on: ubuntu-latest
    outputs:
      registry_state: ${{ steps.registry_state.outputs.value }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with: { version: 11.13.1 }
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false
      - run: pnpm install --frozen-lockfile
      - name: Re-audit production dependencies at release time
        run: pnpm audit --prod --audit-level high
      - name: Build and pack npm package without release authority
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version=${RELEASE_TAG#cli-v}
          pnpm --filter '@lemonize/cli...' build
          node <<'NODE'
          const { readFileSync, readdirSync } = require('node:fs');
          const { join } = require('node:path');

          const minimum = [7, 5, 21];
          const versions = new Set();
          const visit = (directory) => {
            for (const entry of readdirSync(directory, { withFileTypes: true })) {
              const path = join(directory, entry.name);
              if (entry.isDirectory()) visit(path);
              else if (entry.isFile() && entry.name.endsWith('.js')) {
                const source = readFileSync(path, 'utf8');
                for (const match of source.matchAll(/node_modules\/\.pnpm\/tar@(\d+)\.(\d+)\.(\d+)\//g)) {
                  versions.add(match.slice(1, 4).map(Number).join('.'));
                }
              }
            }
          };
          visit('packages/cli/dist');
          if (versions.size !== 1) {
            throw new Error(`Expected exactly one bundled tar version, found: ${[...versions].join(', ') || 'none'}`);
          }
          const bundled = [...versions][0].split('.').map(Number);
          const isPatched = bundled.some((part, index) =>
            part > minimum[index] && bundled.slice(0, index).every((value, prior) => value === minimum[prior]),
          ) || bundled.every((part, index) => part === minimum[index]);
          if (!isPatched) {
            throw new Error(`Refusing to release CLI with vulnerable bundled tar@${bundled.join('.')}`);
          }
          console.log(`Verified patched bundled tar@${bundled.join('.')}`);
          NODE
          mkdir -p "$RUNNER_TEMP/cli-package"
          (
            cd packages/cli
            npm pack --ignore-scripts --json \
              --pack-destination "$RUNNER_TEMP/cli-package" > "$RUNNER_TEMP/cli-pack.json"
          )
          node - "$RUNNER_TEMP/cli-pack.json" "$version" <<'NODE'
          const { readFileSync } = require('node:fs');
          const [path, version] = process.argv.slice(2);
          const value = JSON.parse(readFileSync(path, 'utf8'));
          if (
            !Array.isArray(value) ||
            value.length !== 1 ||
            value[0]?.name !== '@lemonize/cli' ||
            value[0]?.version !== version ||
            value[0]?.filename !== `lemonize-cli-${version}.tgz` ||
            typeof value[0]?.integrity !== 'string' ||
            !value[0].integrity.startsWith('sha512-')
          ) {
            throw new Error('npm pack returned unexpected CLI artifact metadata');
          }
          NODE
      - name: Verify an existing release or mark the version absent
        id: registry_state
        env:
          CLI_PACK_JSON: ${{ runner.temp }}/cli-pack.json
          RELEASE_PACKAGE: '@lemonize/cli'
          RELEASE_REPOSITORY: https://github.com/${{ github.repository }}
          RELEASE_REF: ${{ github.ref }}
          RELEASE_SHA: ${{ github.sha }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_WORKFLOW: .github/workflows/release-cli.yml
        run: |
          set -euo pipefail
          version=${RELEASE_TAG#cli-v}
          registry_status=$(curl --silent --show-error \
            --retry 3 --retry-delay 2 --retry-all-errors \
            --connect-timeout 10 --max-time 30 \
            --proto '=https' \
            --header 'Accept: application/json' \
            --output /dev/null \
            --write-out '%{http_code}' \
            "https://registry.npmjs.org/%40lemonize%2Fcli/$version")
          case "$registry_status" in
            200)
              RELEASE_VERSION="$version" node scripts/ops/verify-npm-release.mjs
              state=existing
              ;;
            404)
              state=missing
              ;;
            *)
              echo "npm registry version probe failed with HTTP $registry_status" >&2
              exit 1
              ;;
          esac
          printf 'value=%s\n' "$state" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: steps.registry_state.outputs.value == 'missing'
        with:
          name: cli-package-${{ github.sha }}
          path: ${{ runner.temp }}/cli-package/*.tgz
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  validate_registry_state:
    needs: package
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Require an exact package-job registry state
        env:
          REGISTRY_STATE: ${{ needs.package.outputs.registry_state }}
        run: |
          case "$REGISTRY_STATE" in
            existing | missing) ;;
            *)
              echo "Invalid package-job registry state: $REGISTRY_STATE" >&2
              exit 1
              ;;
          esac

  publish:
    needs: [package, validate_registry_state]
    # A verified immutable release needs no OIDC authority. The validator
    # fails empty, invalid, or case-variant state before approval is asked.
    if: needs.validate_registry_state.result == 'success' && needs.package.outputs.registry_state == 'missing'
    runs-on: ubuntu-latest
    # This environment intentionally has no Cloudflare, Vercel, Clerk, or
    # Appwrite secrets. Its only authority comes from npm's exact OIDC binding.
    environment: npm-release
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cli-package-${{ github.sha }}
          path: ${{ runner.temp }}/cli-package
          digest-mismatch: error
      - name: Publish or verify @lemonize/cli with npm trusted publishing
        env:
          REGISTRY_STATE: ${{ needs.package.outputs.registry_state }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          test "$REGISTRY_STATE" = 'missing'
          version=${RELEASE_TAG#cli-v}
          shopt -s nullglob
          tarballs=("$RUNNER_TEMP/cli-package"/*.tgz)
          if [[ ${#tarballs[@]} -ne 1 ]]; then
            echo "Expected exactly one CLI tarball from the package job" >&2
            exit 1
          fi
          tarball=${tarballs[0]}
          test "$(basename "$tarball")" = "lemonize-cli-$version.tgz"
          manifest=$(tar -xOf "$tarball" package/package.json)
          node - "$manifest" "$version" <<'NODE'
          const [raw, version] = process.argv.slice(2);
          const manifest = JSON.parse(raw);
          if (manifest.name !== '@lemonize/cli' || manifest.version !== version) {
            throw new Error('CLI tarball identity does not match the release tag');
          }
          NODE
          registry_status=$(curl --silent --show-error \
            --retry 3 --retry-delay 2 --retry-all-errors \
            --connect-timeout 10 --max-time 30 \
            --proto '=https' \
            --header 'Accept: application/json' \
            --output /dev/null \
            --write-out '%{http_code}' \
            "https://registry.npmjs.org/%40lemonize%2Fcli/$version")
          case "$registry_status" in
            404)
              npm publish "$tarball" --ignore-scripts --access public --provenance
              ;;
            200)
              echo "Release appeared after package verification; refusing an unverified retry" >&2
              exit 1
              ;;
            *)
              echo "npm registry version probe failed with HTTP $registry_status" >&2
              exit 1
              ;;
          esac
