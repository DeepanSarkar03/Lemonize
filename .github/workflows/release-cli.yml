name: Release CLI binaries

# Build standalone `lem` binaries for every OS and publish them to R2 so users
# can install without npm/Node:  curl -fsSL https://registry.lemonize.cyou/install.sh | sh
on:
  push:
    tags: ['cli-v*']
  workflow_dispatch:

permissions:
  contents: read
  checks: read

concurrency:
  group: release-cli-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Require protected main commit and matching package version
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ github.sha }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          git fetch --no-tags origin main
          git merge-base --is-ancestor "$RELEASE_SHA" origin/main || {
            echo "Release commit must be reachable from main" >&2
            exit 1
          }
          package_version=$(node -p "require('./packages/cli/package.json').version")
          test "$RELEASE_TAG" = "cli-v$package_version" || {
            echo "Tag does not match packages/cli version" >&2
            exit 1
          }
          required_checks=(
            'Frozen install, lint, typecheck, build, test'
            'Audit production dependencies (high/critical)'
            'Audit development dependencies (high/critical)'
            'Secret scan (full history)'
            'Worker dry-run and web build'
            'Artifact integrity, extraction, and CLI security tests'
          )
          for check_name in "${required_checks[@]}"; do
            successful=$(gh api \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "repos/${GITHUB_REPOSITORY}/commits/${RELEASE_SHA}/check-runs?per_page=100" \
              --jq "[.check_runs[] | select(.name == \"$check_name\" and .conclusion == \"success\")] | length")
            test "$successful" -ge 1 || {
              echo "Required CI check has not passed: $check_name" >&2
              exit 1
            }
          done

  build:
    needs: gate
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            artifact: linux-x64
            expected: lem-linux-x64
          - os: ubuntu-24.04-arm
            artifact: linux-arm64
            expected: lem-linux-arm64
          - os: macos-latest # arm64
            artifact: darwin-arm64
            expected: lem-darwin-arm64
          - os: macos-15-intel
            artifact: darwin-x64
            expected: lem-darwin-x64
          - os: windows-latest
            artifact: windows-x64
            expected: lem-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with: { version: 11.13.1 }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @lemonize/shared --filter @lemonize/package-format build
      - name: Build standalone lem binary
        run: node scripts/build-cli-binary.mjs
      - name: Verify the runner produced the intended target
        env:
          EXPECTED_BINARY: ${{ matrix.expected }}
        run: node -e "const fs=require('node:fs'); const p='packages/cli/dist-bin/'+process.env.EXPECTED_BINARY; if(!fs.statSync(p).isFile()) process.exit(1)"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: lem-${{ matrix.artifact }}
          path: packages/cli/dist-bin/*
          retention-days: 3

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with: { path: dl }
      - run: mkdir -p packages/cli/dist-bin && find dl -type f -exec cp {} packages/cli/dist-bin/ \;
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with: { version: 11.13.1 }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - name: Build and inspect npm package
        run: |
          pnpm --filter @lemonize/cli build
          pnpm --filter @lemonize/cli pack --dry-run
      - name: Install pinned Wrangler CLI
        run: npm install --global wrangler@4.111.0
      # Use a production-environment token scoped only to this release bucket.
      - name: Require release credentials
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLI_R2_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "CLOUDFLARE_API_TOKEN is required" >&2; exit 1; }
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "CLOUDFLARE_ACCOUNT_ID is required" >&2; exit 1; }
      - name: Publish @lemonize/cli with npm trusted publishing
        working-directory: packages/cli
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          version=${RELEASE_VERSION#cli-v}
          if published=$(npm view "@lemonize/cli@$version" version 2>/dev/null); then
            test "$published" = "$version" || exit 1
            echo "@lemonize/cli@$version is already published; verified for an idempotent retry."
          else
            npm publish --access public --provenance
          fi
      - name: Upload native binaries to R2 and advance latest
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLI_R2_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bash scripts/publish-cli-binaries.sh "${GITHUB_REF_NAME#cli-v}"
