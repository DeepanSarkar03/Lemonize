name: Deploy protected Appwrite scanner

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Protected GitHub environment to deploy
        required: true
        type: choice
        options:
          - staging
          - production
      git_ref:
        description: Full 40-character commit SHA that passed CI
        required: true
        type: string

permissions:
  contents: read
  checks: read

concurrency:
  group: appwrite-scanner-${{ inputs.environment }}
  cancel-in-progress: false

env:
  CI: 'true'
  PNPM_VERSION: 11.13.1
  NODE_VERSION: 24
  APPWRITE_CLI_VERSION: 22.6.1

jobs:
  preflight:
    name: Revalidate immutable scanner candidate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0
          persist-credentials: false
      - name: Require an immutable main-branch commit
        env:
          REQUESTED_SHA: ${{ inputs.git_ref }}
        run: |
          if [[ ! "$REQUESTED_SHA" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "git_ref must be a full 40-character commit SHA" >&2
            exit 1
          fi
          test "$(git rev-parse HEAD)" = "${REQUESTED_SHA,,}"
          git show-ref --verify --quiet refs/remotes/origin/main
          git merge-base --is-ancestor "${REQUESTED_SHA,,}" refs/remotes/origin/main
      - name: Require successful CI for the exact commit
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_SHA: ${{ inputs.git_ref }}
        run: |
          required_checks=(
            'Frozen install, lint, typecheck, build, test'
            'Audit production dependencies (high/critical)'
            'Audit development dependencies (high/critical)'
            'Secret scan (full history)'
            'Worker dry-run and web build'
            'Artifact integrity, extraction, and CLI security tests'
          )
          for check_name in "${required_checks[@]}"; do
            successful=$(gh api \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "repos/${GITHUB_REPOSITORY}/commits/${REQUESTED_SHA}/check-runs?per_page=100" \
              --jq "[.check_runs[] | select(.name == \"$check_name\" and .conclusion == \"success\")] | length")
            test "$successful" -ge 1 || {
              echo "Required CI check has not passed for $REQUESTED_SHA: $check_name" >&2
              exit 1
            }
          done

  deploy:
    name: Deploy scanner to ${{ inputs.environment }}
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 1
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install the locked workspace and Appwrite CLI
        run: |
          pnpm install --frozen-lockfile
          npm install --global --ignore-scripts --no-audit --no-fund \
            "appwrite-cli@$APPWRITE_CLI_VERSION"
      - name: Deploy dependency-free scanner bundle
        env:
          APPWRITE_ENDPOINT: ${{ vars.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ vars.APPWRITE_PROJECT_ID }}
          APPWRITE_DEPLOY_API_KEY: ${{ secrets.APPWRITE_DEPLOY_API_KEY }}
          APPWRITE_SCANNER_FUNCTION_ID: ${{ vars.APPWRITE_SCANNER_FUNCTION_ID }}
          APPWRITE_QUARANTINE_BUCKET_ID: ${{ vars.APPWRITE_QUARANTINE_BUCKET_ID }}
          REGISTRY_BASE_URL: ${{ vars.REGISTRY_BASE_URL }}
          SCANNER_SHARED_SECRET: ${{ secrets.SCANNER_SHARED_SECRET }}
          MAX_TARBALL_SIZE_BYTES: ${{ vars.MAX_TARBALL_SIZE_BYTES }}
          MAX_PACKAGE_FILES: ${{ vars.MAX_PACKAGE_FILES }}
        run: bash scripts/ops/deploy-appwrite-scanner.sh
