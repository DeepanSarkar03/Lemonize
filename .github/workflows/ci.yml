name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: 'true'
  PNPM_VERSION: 11.13.1
  NODE_VERSION: 24
  # Clerk only requires a syntactically valid publishable key while prerendering.
  # Deployments pull the real environment-specific key from Vercel.
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmsuZXhhbXBsZS5jb20k

jobs:
  quality:
    name: Frozen install, lint, typecheck, build, test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test

  dependency-audit:
    name: Audit ${{ matrix.scope }} dependencies (high/critical)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        scope: [production, development]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Audit production dependencies
        if: matrix.scope == 'production'
        run: pnpm audit --prod --audit-level high
      - name: Audit development dependencies
        if: matrix.scope == 'development'
        run: pnpm audit --dev --audit-level high

  secret-scan:
    name: Secret scan (full history)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deployment-preflight:
    name: Worker dry-run and web build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build workspace dependencies
        run: pnpm --filter @lemonize/shared build
      - name: Bundle production Workers without deploying
        run: |
          pnpm --filter @lemonize/registry-worker exec wrangler deploy \
            --env production --dry-run --outdir "$RUNNER_TEMP/registry-wrangler-dry-run"
          pnpm --filter @lemonize/npm-proxy-worker exec wrangler deploy \
            --env production --dry-run --outdir "$RUNNER_TEMP/npm-proxy-wrangler-dry-run"
      - name: Build web application
        run: pnpm --filter @lemonize/web build

  artifact-security:
    name: Artifact integrity, extraction, and CLI security tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build artifact dependencies
        run: pnpm --filter @lemonize/shared build && pnpm --filter @lemonize/package-format build
      - name: Test artifact path, integrity, and extraction controls
        run: >-
          pnpm --filter @lemonize/package-format test --
          test/safe-path.test.ts test/integrity.test.ts test/pack-extract.test.ts
      - name: Test CLI artifact security controls
        run: pnpm --filter @lemonize/cli test -- test/security.test.ts test/install.test.ts
      - name: Test npm proxy origin and credential boundaries
        run: pnpm --filter @lemonize/npm-proxy-worker test
