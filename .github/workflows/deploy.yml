name: Deploy protected environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Protected GitHub environment to deploy
        required: true
        type: choice
        options:
          - staging
          - production
      git_ref:
        description: Full 40-character commit SHA that passed CI
        required: true
        type: string
      enable_production_writes:
        description: Explicitly authorize a mutable production deployment
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  checks: read

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

env:
  CI: 'true'
  PNPM_VERSION: 11.13.1
  NODE_VERSION: 24
  APPWRITE_CLI_VERSION: 22.6.1
  VERCEL_CLI_VERSION: 56.3.1

jobs:
  preflight:
    name: Revalidate immutable release candidate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0
          persist-credentials: false
      - name: Require an immutable commit SHA
        env:
          REQUESTED_SHA: ${{ inputs.git_ref }}
          DEPLOY_ENV: ${{ inputs.environment }}
          ENABLE_PRODUCTION_WRITES: ${{ inputs.enable_production_writes }}
        run: |
          if [[ ! "$REQUESTED_SHA" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "git_ref must be a full 40-character commit SHA" >&2
            exit 1
          fi
          test "$(git rev-parse HEAD)" = "${REQUESTED_SHA,,}"
          git show-ref --verify --quiet refs/remotes/origin/main || {
            echo "origin/main was not fetched by the immutable checkout" >&2
            exit 1
          }
          if ! git merge-base --is-ancestor "${REQUESTED_SHA,,}" refs/remotes/origin/main; then
            echo "deployment SHA must be reachable from origin/main" >&2
            exit 1
          fi
          if [[ "$DEPLOY_ENV" != production && "$ENABLE_PRODUCTION_WRITES" == true ]]; then
            echo "enable_production_writes is valid only for production" >&2
            exit 1
          fi
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - name: Build release candidate
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmsuZXhhbXBsZS5jb20k
        run: pnpm build
      - run: pnpm test
      - run: pnpm audit --prod --audit-level high
      - run: pnpm audit --dev --audit-level high
      - name: Require successful CI for the exact commit
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_SHA: ${{ inputs.git_ref }}
        run: |
          required_checks=(
            'Frozen install, lint, typecheck, build, test'
            'Audit production dependencies (high/critical)'
            'Audit development dependencies (high/critical)'
            'Secret scan (full history)'
            'Worker dry-run and web build'
            'Artifact integrity, extraction, and CLI security tests'
          )
          for check_name in "${required_checks[@]}"; do
            successful=$(gh api \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "repos/${GITHUB_REPOSITORY}/commits/${REQUESTED_SHA}/check-runs?per_page=100" \
              --jq "[.check_runs[] | select(.name == \"$check_name\" and .conclusion == \"success\")] | length")
            test "$successful" -ge 1 || {
              echo "Required CI check has not passed for $REQUESTED_SHA: $check_name" >&2
              exit 1
            }
          done

  deploy:
    name: Deploy ${{ inputs.environment }}
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment:
      name: ${{ inputs.environment }}
      url: ${{ steps.web.outputs.url }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 1
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install locked application and deployment CLIs
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @lemonize/shared build
          npm install --global "appwrite-cli@$APPWRITE_CLI_VERSION"
          npm install --global "vercel@$VERCEL_CLI_VERSION"

      - name: Validate non-secret deployment configuration
        env:
          DEPLOY_ENV: ${{ inputs.environment }}
          WORKER_NAME: ${{ vars.WORKER_NAME }}
          CF_KV_NAMESPACE_ID: ${{ vars.CF_KV_NAMESPACE_ID }}
          CF_R2_BUCKET: ${{ vars.CF_R2_BUCKET }}
          CLOUDFLARE_ROUTE_PATTERN: ${{ vars.CLOUDFLARE_ROUTE_PATTERN }}
          ALLOW_PUBLIC_PUBLISH: ${{ vars.ALLOW_PUBLIC_PUBLISH }}
          ALLOW_PRIVATE_PACKAGES: ${{ vars.ALLOW_PRIVATE_PACKAGES }}
          MAX_TARBALL_SIZE_BYTES: ${{ vars.MAX_TARBALL_SIZE_BYTES }}
          MAX_UNPACKED_SIZE_BYTES: ${{ vars.MAX_UNPACKED_SIZE_BYTES }}
          MAX_PACKAGE_FILES: ${{ vars.MAX_PACKAGE_FILES }}
          MAX_GLOBAL_ARTIFACT_BYTES: ${{ vars.MAX_GLOBAL_ARTIFACT_BYTES }}
          RATE_LIMIT_READS_PER_MINUTE: ${{ vars.RATE_LIMIT_READS_PER_MINUTE }}
          RATE_LIMIT_WRITES_PER_MINUTE: ${{ vars.RATE_LIMIT_WRITES_PER_MINUTE }}
          REGISTRY_BASE_URL: ${{ vars.REGISTRY_BASE_URL }}
          WEB_BASE_URL: ${{ vars.WEB_BASE_URL }}
          CORS_ALLOWED_ORIGINS: ${{ vars.CORS_ALLOWED_ORIGINS }}
          ADMIN_CLERK_IDS: ${{ vars.ADMIN_CLERK_IDS }}
          REGISTRY_MODE: ${{ vars.REGISTRY_MODE }}
          PRODUCTION_WRITE_APPROVED: ${{ inputs.enable_production_writes && 'ENABLE_PUBLIC_WRITES' || '' }}
          APPWRITE_ENDPOINT: ${{ vars.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ vars.APPWRITE_PROJECT_ID }}
          APPWRITE_DATABASE_ID: ${{ vars.APPWRITE_DATABASE_ID }}
          APPWRITE_QUARANTINE_BUCKET_ID: ${{ vars.APPWRITE_QUARANTINE_BUCKET_ID }}
          APPWRITE_SCANNER_FUNCTION_ID: ${{ vars.APPWRITE_SCANNER_FUNCTION_ID }}
          CLERK_ISSUER: ${{ vars.CLERK_ISSUER }}
          CLERK_AUTHORIZED_PARTIES: ${{ vars.CLERK_AUTHORIZED_PARTIES }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          NPM_PROXY_BASE_URL: ${{ vars.NPM_PROXY_BASE_URL }}
        run: |
          bash scripts/ops/require-env.sh \
            DEPLOY_ENV WORKER_NAME CF_KV_NAMESPACE_ID CF_R2_BUCKET CLOUDFLARE_ROUTE_PATTERN \
            ALLOW_PUBLIC_PUBLISH ALLOW_PRIVATE_PACKAGES MAX_TARBALL_SIZE_BYTES \
            MAX_UNPACKED_SIZE_BYTES MAX_PACKAGE_FILES MAX_GLOBAL_ARTIFACT_BYTES RATE_LIMIT_READS_PER_MINUTE \
            RATE_LIMIT_WRITES_PER_MINUTE REGISTRY_BASE_URL WEB_BASE_URL \
            CORS_ALLOWED_ORIGINS REGISTRY_MODE APPWRITE_ENDPOINT \
            APPWRITE_PROJECT_ID APPWRITE_DATABASE_ID APPWRITE_QUARANTINE_BUCKET_ID \
            APPWRITE_SCANNER_FUNCTION_ID CLERK_ISSUER CLERK_AUTHORIZED_PARTIES \
            VERCEL_ORG_ID VERCEL_PROJECT_ID NPM_PROXY_BASE_URL
          node scripts/ops/verify-appwrite-config.mjs "$DEPLOY_ENV"
          node scripts/ops/render-wrangler-config.mjs "$RUNNER_TEMP/wrangler.json"
          pnpm --filter @lemonize/registry-worker exec wrangler deploy \
            --config "$RUNNER_TEMP/wrangler.json" --dry-run \
            --outdir "$RUNNER_TEMP/wrangler-dry-run"

      - name: Push Appwrite resource definitions
        env:
          APPWRITE_ENDPOINT: ${{ vars.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ vars.APPWRITE_PROJECT_ID }}
          APPWRITE_DEPLOY_API_KEY: ${{ secrets.APPWRITE_DEPLOY_API_KEY }}
        run: |
          bash scripts/ops/require-env.sh \
            APPWRITE_ENDPOINT APPWRITE_PROJECT_ID APPWRITE_DEPLOY_API_KEY
          appwrite_home="$RUNNER_TEMP/appwrite-home"
          trap 'rm -rf -- "$appwrite_home"' EXIT
          umask 077
          mkdir -p "$appwrite_home"
          HOME="$appwrite_home" appwrite client \
            --endpoint "$APPWRITE_ENDPOINT" \
            --project-id "$APPWRITE_PROJECT_ID" \
            --key "$APPWRITE_DEPLOY_API_KEY" >/dev/null
          cd "infrastructure/appwrite/${{ inputs.environment }}"
          HOME="$appwrite_home" appwrite --force push all --no-logs

      - name: Reconcile and deploy Appwrite artifact scanner
        env:
          APPWRITE_ENDPOINT: ${{ vars.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ vars.APPWRITE_PROJECT_ID }}
          APPWRITE_DEPLOY_API_KEY: ${{ secrets.APPWRITE_DEPLOY_API_KEY }}
          APPWRITE_SCANNER_FUNCTION_ID: ${{ vars.APPWRITE_SCANNER_FUNCTION_ID }}
          APPWRITE_QUARANTINE_BUCKET_ID: ${{ vars.APPWRITE_QUARANTINE_BUCKET_ID }}
          REGISTRY_BASE_URL: ${{ vars.REGISTRY_BASE_URL }}
          SCANNER_SHARED_SECRET: ${{ secrets.SCANNER_SHARED_SECRET }}
          MAX_TARBALL_SIZE_BYTES: ${{ vars.MAX_TARBALL_SIZE_BYTES }}
          MAX_PACKAGE_FILES: ${{ vars.MAX_PACKAGE_FILES }}
        run: bash scripts/ops/deploy-appwrite-scanner.sh

      - name: Deploy Cloudflare Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          APPWRITE_RUNTIME_API_KEY: ${{ secrets.APPWRITE_RUNTIME_API_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          SCANNER_SHARED_SECRET: ${{ secrets.SCANNER_SHARED_SECRET }}
        run: |
          bash scripts/ops/require-env.sh \
            CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID APPWRITE_RUNTIME_API_KEY \
            CLERK_SECRET_KEY SCANNER_SHARED_SECRET
          node -e '
            const values = {
              APPWRITE_API_KEY: process.env.APPWRITE_RUNTIME_API_KEY,
              CLERK_SECRET_KEY: process.env.CLERK_SECRET_KEY,
              SCANNER_SHARED_SECRET: process.env.SCANNER_SHARED_SECRET,
            };
            process.stdout.write(JSON.stringify(values));
          ' | pnpm --filter @lemonize/registry-worker exec wrangler secret bulk \
            --config "$RUNNER_TEMP/wrangler.json"
          pnpm --filter @lemonize/registry-worker exec wrangler deploy \
            --config "$RUNNER_TEMP/wrangler.json"

      - name: Deploy read-only npm CDN proxy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEPLOY_ENV: ${{ inputs.environment }}
        run: |
          bash scripts/ops/require-env.sh \
            CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID DEPLOY_ENV
          pnpm --filter @lemonize/npm-proxy-worker exec wrangler deploy \
            --env "$DEPLOY_ENV"

      - name: Build and deploy web with Vercel
        id: web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_REGISTRY_URL: ${{ vars.REGISTRY_BASE_URL }}
          WEB_BASE_URL: ${{ vars.WEB_BASE_URL }}
          DEPLOY_ENV: ${{ inputs.environment }}
        run: |
          bash scripts/ops/require-env.sh \
            VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID \
            NEXT_PUBLIC_REGISTRY_URL WEB_BASE_URL
          if [[ "$DEPLOY_ENV" == production ]]; then
            target=production
          else
            target=preview
          fi
          vercel pull --cwd apps/web \
            --yes --environment "$target" --token "$VERCEL_TOKEN"
          vercel build --cwd apps/web \
            --yes --target "$target" --token "$VERCEL_TOKEN"
          deployment_url=$(vercel deploy --cwd apps/web \
            --yes --prebuilt --target "$target" --token "$VERCEL_TOKEN" --no-color | tail -n 1 | tr -d '\r')
          if [[ ! "$deployment_url" =~ ^https:// ]]; then
            echo "Vercel did not return an HTTPS deployment URL" >&2
            exit 1
          fi
          if [[ "$DEPLOY_ENV" == staging ]]; then
            stable_hostname=$(node -e 'process.stdout.write(new URL(process.env.WEB_BASE_URL).hostname)')
            vercel alias set "$deployment_url" "$stable_hostname" \
              --token "$VERCEL_TOKEN" --non-interactive
          fi
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "url=$WEB_BASE_URL" >> "$GITHUB_OUTPUT"

      - name: Smoke test deployed registry and web
        env:
          REGISTRY_SMOKE_URL: ${{ vars.REGISTRY_BASE_URL }}
          WEB_SMOKE_URL: ${{ vars.WEB_BASE_URL }}
          NPM_PROXY_SMOKE_URL: ${{ vars.NPM_PROXY_BASE_URL }}
        run: bash scripts/ops/smoke-test.sh

      - name: Record deployment
        env:
          DEPLOY_ENV: ${{ inputs.environment }}
          DEPLOYED_WEB_URL: ${{ steps.web.outputs.deployment_url }}
          STABLE_WEB_URL: ${{ steps.web.outputs.url }}
          RELEASE_SHA: ${{ inputs.git_ref }}
        run: |
          {
            echo "### Deployment completed"
            echo "- Environment: $DEPLOY_ENV"
            echo "- Commit: $RELEASE_SHA"
            echo "- Web deployment: $DEPLOYED_WEB_URL"
            echo "- Stable web origin: $STABLE_WEB_URL"
          } >> "$GITHUB_STEP_SUMMARY"
